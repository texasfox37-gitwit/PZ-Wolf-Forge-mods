name: Bug report
description: Report a TDDUP Java Bridge problem after installing the required GitHub bridge.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please do not paste Steam passwords, GitHub tokens, or personal credentials.
  - type: input
    id: bridge_version
    attributes:
      label: Bridge version
      description: Example: 0.1.36-required
      placeholder: 0.1.36-required
    validations:
      required: true
  - type: checkboxes
    id: install_confirm
    attributes:
      label: Install confirmation
      options:
        - label: I installed the required GitHub Java Bridge, not only the Steam Workshop item.
          required: true
        - label: Project Zomboid was fully closed when I installed or reinstalled the bridge.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem in plain language.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant console.txt lines
      description: Paste only the relevant TDDUP or Java Bridge lines. Do not include private information.
      render: text
    validations:
      required: false
